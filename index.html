<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dave the Diver Checklist</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-top">
        <div class="brand">
          <div class="brand-title">
            <span class="brand-mark" aria-hidden="true">🐟</span>
            <h1>Dave the Diver Checklist</h1>
          </div>
          <p class="brand-sub">물고기 도감 수집 체크리스트</p>
        </div>
        <button id="authBtn" type="button" class="auth-btn">로그인</button>
      </div>
      <div class="toolbar">
        <input id="search" placeholder="물고기 이름, 영어 이름, 지역">
        <div class="toolbar-select" id="areaFilterWrap">
          <button id="areaFilterTrigger" type="button" class="toolbar-select-trigger" aria-haspopup="menu" aria-expanded="false">전체 지역</button>
          <div id="areaFilterMenu" class="toolbar-select-menu" role="menu"></div>
        </div>
        <button id="todoOnly">완료 숨기기</button>
        <button id="notMaxOnly">MAX 숨기기</button>
        <button id="resetBtn">초기화</button>
      </div>
    </div>
  </header>

  <main>
    <section class="summary">
      <div class="stat stat--total">전체<br><b id="total">0</b></div>
      <div class="stat stat--done">완료<br><b id="done">0</b></div>
      <div class="stat stat--todo">미완료<br><b id="todo">0</b></div>
      <div class="stat stat--rate">진행률<br><b id="rate">0%</b></div>
    </section>
    <div id="app"></div>
  </main>

  <div id="resetModal" class="modal-shell" hidden>
    <div class="modal-backdrop" data-close-reset="true"></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="resetModalTitle">
      <h2 id="resetModalTitle">진행 기록 초기화</h2>
      <p>체크, 랭크, 수족관 상태를 모두 지웁니다.</p>
      <div class="modal-actions">
        <button id="resetCancelBtn" type="button" class="modal-btn">취소</button>
        <button id="resetConfirmBtn" type="button" class="modal-btn modal-btn-danger">초기화</button>
      </div>
    </div>
  </div>

  <div id="loginModal" class="modal-shell" hidden>
    <div class="modal-backdrop" data-close-login="true"></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="loginModalTitle">
      <h2 id="loginModalTitle">로그인</h2>
      <p>같은 ID로 로그인한 기기끼리 진행 기록이 동기화됩니다.</p>
      <input id="syncKey" type="text" class="login-input" placeholder="ID" autocomplete="off">
      <span id="syncStatus" class="sync-status" data-tone="idle"></span>
      <div class="modal-actions">
        <button id="loginCancelBtn" type="button" class="modal-btn" data-close-login="true">취소</button>
        <button id="syncConnectBtn" type="button" class="modal-btn modal-btn-primary">로그인</button>
      </div>
    </div>
  </div>

  <script src="./data.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
